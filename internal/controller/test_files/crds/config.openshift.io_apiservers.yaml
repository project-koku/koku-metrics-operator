apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.openshift.io: https://github.com/openshift/api/pull/470
  name: apiservers.config.openshift.io
spec:
  group: config.openshift.io
  names:
    kind: APIServer
    plural: apiservers
    singular: apiserver
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: "APIServer holds configuration shared by all API servers in the system."
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                tlsSecurityProfile:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - Old
                        - Intermediate
                        - Modern
                        - Custom
                    old:
                      type: object
                      nullable: true
                    intermediate:
                      type: object
                      nullable: true
                    modern:
                      type: object
                      nullable: true
                    custom:
                      type: object
                      nullable: true
                      properties:
                        ciphers:
                          type: array
                          items:
                            type: string
                        minTLSVersion:
                          type: string
                servingCerts:
                  type: object
                  properties:
                    namedCertificates:
                      type: array
                      items:
                        type: object
                clientCA:
                  type: object
                additionalCORSAllowedOrigins:
                  type: array
                  items:
                    type: string
                encryption:
                  type: object
                audit:
                  type: object
            status:
              type: object
      subresources:
        status: {}
